AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Databricks PRD to Supabase incremental sync — runs on schedule via EventBridge.
  Uses OAuth M2M (Service Principal) for Databricks authentication.

Globals:
  Function:
    Timeout: 300
    MemorySize: 256
    Runtime: nodejs20.x

Parameters:
  DatabricksHost:
    Type: String
    Description: Databricks PRD SQL warehouse hostname
  DatabricksHttpPath:
    Type: String
    Description: Databricks PRD SQL warehouse HTTP path
  DatabricksClientId:
    Type: String
    Description: Service Principal Application (Client) ID
  DatabricksClientSecret:
    Type: String
    NoEcho: true
    Description: Service Principal OAuth secret
  SupabaseUrl:
    Type: String
    Description: Supabase project URL (https://xxx.supabase.co)
  SupabaseServiceRoleKey:
    Type: String
    NoEcho: true
    Description: Supabase service_role API key
  DbxTable:
    Type: String
    Default: prod.gldlogistica.db_trade_dim_app_transportistas
    Description: Databricks source table (catalog.schema.table)
  BatchSize:
    Type: String
    Default: "500"
    Description: Rows per upsert batch
  ScheduleExpression:
    Type: String
    Default: cron(0 5 * * ? *)
    Description: How often to run the sync (EventBridge schedule)

Resources:
  EtlLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub patek-philippe-etl-logs-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: RetainLogs90Days
            Status: Enabled
            ExpirationInDays: 90

  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: patek-philippe
      Handler: handler.lambdaHandler
      CodeUri: lambda_function/
      Description: Incremental sync transportistas from Databricks PRD to Supabase
      Environment:
        Variables:
          DATABRICKS_HOST: !Ref DatabricksHost
          DATABRICKS_HTTP_PATH: !Ref DatabricksHttpPath
          DATABRICKS_CLIENT_ID: !Ref DatabricksClientId
          DATABRICKS_CLIENT_SECRET: !Ref DatabricksClientSecret
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceRoleKey
          DBX_TABLE: !Ref DbxTable
          BATCH_SIZE: !Ref BatchSize
          ETL_LOGS_BUCKET: !Ref EtlLogsBucket
      Events:
        ScheduledSync:
          Type: Schedule
          Properties:
            Schedule: !Ref ScheduleExpression
            Description: Scheduled Databricks PRD to Supabase incremental sync
            Enabled: true
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref EtlLogsBucket
    Metadata:
      BuildMethod: nodejs20.x

  SyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${SyncFunction}
      RetentionInDays: 14

Outputs:
  SyncFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SyncFunction.Arn
  SyncFunctionName:
    Description: Lambda function name
    Value: !Ref SyncFunction
  EtlLogsBucketName:
    Description: S3 bucket for ETL execution logs
    Value: !Ref EtlLogsBucket